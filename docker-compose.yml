services:
  noas-db:
    image: postgres:16-alpine
    container_name: noas-db
    environment:
      POSTGRES_USER: noas
      POSTGRES_PASSWORD: noas
      POSTGRES_DB: noas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noas"]
      interval: 10s
      timeout: 5s
      retries: 5

  noas:
    build: .
    container_name: noas
    depends_on:
      noas-db:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:setup && npm start"]
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://noas:noas@noas-db:5432/noas
      DOMAIN: localhost:3007
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      ALLOWED_SIGNUP_EMAIL_DOMAIN: ${ALLOWED_SIGNUP_EMAIL_DOMAIN:-}
      TENANT_DEFAULT_RELAYS: ${TENANT_DEFAULT_RELAYS:-}
      DOMAIN_RELAY_MAP: ${DOMAIN_RELAY_MAP:-}
      EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-30}
      EXPOSE_VERIFICATION_TOKEN_IN_RESPONSE: ${EXPOSE_VERIFICATION_TOKEN_IN_RESPONSE:-false}
    ports:
      - "3007:3000"
    restart: unless-stopped

volumes:
  postgres_data:
