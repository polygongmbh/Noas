services:
  postgres:
    image: postgres:16-alpine
    container_name: noas-db
    environment:
      POSTGRES_USER: noas
      POSTGRES_PASSWORD: noas
      POSTGRES_DB: noas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
