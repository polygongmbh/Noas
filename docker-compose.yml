services:
  noas-db:
    image: postgres:16-alpine
    container_name: noas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: noas
      POSTGRES_PASSWORD: noas
      POSTGRES_DB: noas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noas"]
      interval: 10s
      timeout: 5s
      retries: 5

  noas:
    build: .
    container_name: noas
    restart: unless-stopped
    depends_on:
      noas-db:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:setup && npm start"]
    environment:
      PORT: 3000
      # Keep container runtime env owned by docker-compose.
      NOAS_LOAD_DOTENV: "false"
      DATABASE_URL: postgresql://noas:noas@noas-db:5432/noas
      DOMAIN: ${DOMAIN:-localhost:3007}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      EMAIL_VERIFICATION_ENABLED: ${EMAIL_VERIFICATION_ENABLED:-false}
      VERIFICATION_EXPIRY_MINUTES: ${VERIFICATION_EXPIRY_MINUTES:-15}
      RESEND_COOLDOWN_MINUTES: ${RESEND_COOLDOWN_MINUTES:-1}
      NIP05_DOMAIN: ${NIP05_DOMAIN:-localhost}
      NOAS_PUBLIC_URL: ${NOAS_PUBLIC_URL:-http://localhost:3007}
      NOAS_BASE_PATH: ${NOAS_BASE_PATH:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ALLOWED_SIGNUP_EMAIL_DOMAIN: ${ALLOWED_SIGNUP_EMAIL_DOMAIN:-}
      TENANT_DEFAULT_RELAYS: ${TENANT_DEFAULT_RELAYS:-}
      DOMAIN_RELAY_MAP: ${DOMAIN_RELAY_MAP:-}
      EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-30}
      EXPOSE_VERIFICATION_TOKEN_IN_RESPONSE: ${EXPOSE_VERIFICATION_TOKEN_IN_RESPONSE:-false}
      REQUIRE_EMAIL_DELIVERY: ${REQUIRE_EMAIL_DELIVERY:-false}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED:-true}
    networks:
      - noas
      - default

volumes:
  postgres_data:

networks:
  noas:
    external: true
