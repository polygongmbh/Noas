services:
  noas-db:
    image: postgres:16-alpine
    container_name: noas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: noas
      POSTGRES_PASSWORD: noas
      POSTGRES_DB: noas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noas"]
      interval: 10s
      timeout: 5s
      retries: 5

  noas:
    build: .
    container_name: noas
    restart: unless-stopped
    depends_on:
      noas-db:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:migrate && npm start"]
    # ports:
    #   - 3000:3000
    env_file:
      - .env
    networks:
      - noas
      - default

volumes:
  postgres_data:

networks:
  noas:
    external: true
