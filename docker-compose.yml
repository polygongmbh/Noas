services:
  postgres:
    image: postgres:16-alpine
    container_name: noas-db
    environment:
      POSTGRES_USER: noas
      POSTGRES_PASSWORD: noas
      POSTGRES_DB: noas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noas"]
      interval: 10s
      timeout: 5s
      retries: 5

  noas:
    build: .
    container_name: noas
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:setup && npm start"]
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://noas:noas@postgres:5432/noas
      DOMAIN: noas.progyssey.org
    ports:
      - "3007:3000"
    restart: unless-stopped

volumes:
  postgres_data:
