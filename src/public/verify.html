<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify Identity | Noas</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>Verify your identity</h1>
        <p id="verifyMessage">Checking verification link...</p>
        <p id="verifyNip05"></p>
        <p id="verifyPublicKeyHex"></p>
        <p id="verifyPublicKeyNpub"></p>
        <p id="verifyExpiry"></p>
        <form id="verifyForm" class="form" hidden>
          <label>
            Password
            <input id="verifyPassword" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="btn">Verify</button>
          <div id="verifyStatus" class="status"></div>
        </form>
        <button id="backToApp" class="btn" hidden>Back to app</button>
        <button id="backToNoas" class="btn subtle" hidden>Back to Noas</button>
      </section>
    </main>

    <script src="/nostr.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = (params.get('token') || '').trim();
      const redirectRaw = (params.get('redirect') || params.get('origin') || '').trim();
      const verifyForm = document.getElementById('verifyForm');
      const verifyPassword = document.getElementById('verifyPassword');
      const verifyStatus = document.getElementById('verifyStatus');
      const verifyMessage = document.getElementById('verifyMessage');
      const verifyNip05 = document.getElementById('verifyNip05');
      const verifyPublicKeyHex = document.getElementById('verifyPublicKeyHex');
      const verifyPublicKeyNpub = document.getElementById('verifyPublicKeyNpub');
      const verifyExpiry = document.getElementById('verifyExpiry');
      const backToApp = document.getElementById('backToApp');
      const backToNoas = document.getElementById('backToNoas');
      let verifiedNip05 = '';
      let trustedNip05Domain = '';
      let trustedOrigins = [];

      function tryDecodeURIComponent(value) {
        try {
          return decodeURIComponent(value);
        } catch {
          return value;
        }
      }

      function decodeRedirectValue(value) {
        let decoded = String(value || '').trim();
        for (let i = 0; i < 2; i += 1) {
          const next = tryDecodeURIComponent(decoded);
          if (next === decoded) break;
          decoded = next;
        }
        return decoded;
      }

      function normalizeRedirect(value) {
        const decoded = decodeRedirectValue(value);
        if (!decoded) return '';
        if (decoded.startsWith('https://') || decoded.startsWith('http://')) return decoded;
        if (decoded.startsWith('//')) return `${window.location.protocol}${decoded}`;
        if (decoded.startsWith('/')) return decoded;
        if (/^[a-z0-9.-]+\.[a-z]{2,}([/:?#]|$)/i.test(decoded)) return `https://${decoded}`;
        return '';
      }

      const redirect = normalizeRedirect(redirectRaw);
      const tenantLandingUrl = new URL('/', window.location.origin).toString();

      if (redirect) {
        backToApp.hidden = false;
        backToApp.addEventListener('click', () => {
          window.location.assign(redirect);
        });
      }

      if (backToNoas) {
        backToNoas.addEventListener('click', () => {
          window.location.assign(tenantLandingUrl);
        });
      }

      function isAlreadyUsedError(message) {
        const normalized = String(message || '').trim().toLowerCase();
        return normalized.includes('already active') || normalized.includes('already used');
      }

      function showAlreadyUsedActions() {
        if (redirect) {
          backToApp.hidden = false;
          backToApp.textContent = 'Back to app';
        } else {
          backToApp.hidden = true;
        }
        if (backToNoas) {
          backToNoas.hidden = false;
        }
      }

      async function loadTrustMetadata() {
        try {
          const response = await fetch('/.well-known/nostr.json');
          const data = await response.json().catch(() => ({}));
          if (!response.ok) return;
          trustedNip05Domain = String(data?.noas?.nip05_domain || '').trim().toLowerCase();
          trustedOrigins = Array.isArray(data?.noas?.trusted_redirect_origins)
            ? data.noas.trusted_redirect_origins
              .map((origin) => String(origin || '').trim().toLowerCase())
              .filter(Boolean)
            : [];
        } catch {
          // Non-blocking fallback.
        }
      }

      function isTrustedRedirect(value) {
        if (!value) return false;
        try {
          const parsed = new URL(value);
          if (parsed.protocol !== 'https:' && parsed.protocol !== 'http:') return false;
          const host = parsed.hostname.toLowerCase();
          const origin = parsed.origin.toLowerCase();
          const currentHost = window.location.hostname.toLowerCase();
          if (host === currentHost) return true;
          if (trustedOrigins.includes(origin)) return true;
          if (!trustedNip05Domain) return false;
          return host === trustedNip05Domain || host.endsWith(`.${trustedNip05Domain}`);
        } catch {
          return false;
        }
      }

      function setStatus(message, type = 'info') {
        verifyStatus.textContent = message;
        verifyStatus.dataset.type = type;
      }

      async function sha256Hex(text) {
        const bytes = new TextEncoder().encode(text);
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return Array.from(new Uint8Array(digest))
          .map((byte) => byte.toString(16).padStart(2, '0'))
          .join('');
      }

      function renderError(message) {
        verifyMessage.textContent = message;
        verifyForm.hidden = true;
        verifyStatus.textContent = '';
        verifyPassword.value = '';
        verifyNip05.textContent = '';
        verifyPublicKeyHex.textContent = '';
        verifyPublicKeyNpub.textContent = '';
        verifyExpiry.textContent = '';
      }

      function renderPreview(data) {
        verifyMessage.textContent = 'Enter your password to activate this account.';
        verifiedNip05 = String(data.nip05 || '').trim();
        verifyNip05.textContent = verifiedNip05 ? `NIP-05: ${verifiedNip05}` : '';
        const hexPubkey = String(data.public_key || '').trim().toLowerCase();
        const npubPubkey = window.NoasNostr?.npubFromHexPublicKey(hexPubkey) || '';
        verifyPublicKeyHex.textContent = hexPubkey ? `Public key (hex): ${hexPubkey}` : '';
        verifyPublicKeyNpub.textContent = npubPubkey ? `Public key (npub): ${npubPubkey}` : '';
        if (data.expires_at) {
          const minutesLeft = Math.max(
            1,
            Math.ceil((new Date(data.expires_at).getTime() - Date.now()) / (1000 * 60))
          );
          verifyExpiry.textContent = `Expires in about ${minutesLeft} minute${minutesLeft === 1 ? '' : 's'}.`;
        }
        verifyForm.hidden = false;
      }

      async function loadPreview() {
        if (!token) {
          renderError('Invalid link.');
          return;
        }
        try {
          const response = await fetch(`/api/v1/auth/verify?token=${encodeURIComponent(token)}`);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || 'Invalid link.');
          }
          renderPreview(data);
        } catch (error) {
          if (isAlreadyUsedError(error.message)) {
            showAlreadyUsedActions();
          }
          renderError(error.message || 'Invalid link.');
        }
      }

      verifyForm?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const password = verifyPassword.value;
        if (!password) {
          setStatus('Password is required.', 'error');
          return;
        }
        setStatus('Verifying...', 'info');
        try {
          const passwordHash = await sha256Hex(password);
          const response = await fetch('/api/v1/auth/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token,
              password_hash: passwordHash,
            }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || 'Verification failed.');
          }
          setStatus('Account verified. You can now sign in.', 'success');
          if (redirect && !isTrustedRedirect(redirect)) {
            backToApp.hidden = false;
            backToApp.textContent = 'Continue to destination';
            setStatus(
              'Account verified. This destination is not vetted. If you trust it, click continue.',
              'success'
            );
            return;
          }
          const homeUrl = new URL('/', window.location.origin);
          homeUrl.searchParams.set('verified', '1');
          if (verifiedNip05) {
            homeUrl.searchParams.set('nip05', verifiedNip05);
          }
          const destination = redirect || homeUrl.toString();
          setTimeout(() => {
            window.location.assign(destination);
          }, 700);
        } catch (error) {
          if (isAlreadyUsedError(error.message)) {
            showAlreadyUsedActions();
          }
          setStatus(error.message || 'Verification failed.', 'error');
        }
      });

      loadTrustMetadata();
      loadPreview();
    </script>
  </body>
</html>
